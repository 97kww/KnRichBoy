<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | KnRichBoy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
       
        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }


        

        /* TELA DE INÍCIO COM DESFOQUE */
        #entry-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #entry-overlay h2 {
            color: #fff;
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(0.98); }
        }

        .bg-animated {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, #050505, #1a1a1a, #0f0f0f, #000000);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            z-index: 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255, 0, 0, 0.05) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
            pointer-events: none;
        }

                .profile-card {
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); /* Aumenta o desfoque do fundo */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); /* Borda fina "cristalina" */
            border-radius: 40px;
            padding: 50px 25px;
            width: 360px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transition: 0.5s ease;
        }

        /* Faz o card inteiro dar uma leve iluminada quando você passa o mouse */
        .profile-card:hover {
            border: 1px solid rgba(255, 0, 0, 0.2); /* Borda levemente vermelha no foco */
            box-shadow: 0 40px 100px rgba(255, 0, 0, 0.1);
        }

        .avatar {
            width: 105px; height: 105px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(153, 149, 149, 0.4);
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.2);
                transform: scale(1);
            }
            100% {
                box-shadow: 0 0 25px rgba(255, 255, 255, 0.6), 0 0 40px rgba(0, 0, 0, 0.3);
                transform: scale(1.03);
            }
        }

        h1 { color: #fff; font-weight: 200; font-size: 2rem; letter-spacing: 6px; margin-bottom: 35px; }

                /* Estilo base do Card (Ajustado para animação) */
            .discord-pill {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 50px;
                padding: 12px 20px;
                display: flex;
                align-items: center;
                gap: 15px;
                cursor: pointer;
                margin-bottom: 40px;
                
                /* ESSA LINHA É A CHAVE: Faz tudo mover suavemente */
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
                position: relative;
                overflow: hidden;
            }

            /* ANIMAÇÃO AO PASSAR O MOUSE */
            .discord-pill:hover {
                transform: translateY(-5px) scale(1.02); /* Sobe um pouco e cresce levemente */
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(88, 101, 242, 0.4); /* Borda levemente roxa do Discord */
                
                /* Brilho (Glow) externo */
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(88, 101, 242, 0.2);
            }

            /* Animação na Foto dentro do Card */
            .discord-pill img {
                width: 38px; height: 38px; border-radius: 50%;
                transition: transform 0.4s ease;
            }

            .discord-pill:hover img {
                transform: scale(1.1) rotate(5deg); /* Foto cresce e gira um tiquinho */
            }
                    .discord-txt { text-align: left; }
        .discord-txt b { color: #ffffff; font-size: 0.85rem; display: block; }
        .discord-txt span { color: rgba(255,255,255,0.25); font-size: 0.65rem; text-transform: uppercase; }

        .icon-container { display: flex; justify-content: center; gap: 22px; margin-top: 20px; }
        .icon-link { color: #fff; opacity: 0.3; transition: 0.4s ease; font-size: 1.6rem; text-decoration: none; }
        
        /* HOVER GERAL: GIRA 10 GRAUS */
        .icon-link:hover { 
            opacity: 1; 
            transform: rotate(10deg); 
        }
        
        /* Instagram: Gradiente Real */
        .icon-instagram:hover { 
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(214, 36, 159, 0.5));
        }
        
        /* TikTok: Efeito Neon Ciano/Rosa */
        .icon-tiktok:hover { 
            color: #fff;
            text-shadow: 2px 2px #ff0050, -2px -2px #00f2ea; 
        }
        
        /* Discord: Blurple Oficial */
        .icon-discord:hover { 
            color: #5865F2; 
            filter: drop-shadow(0 0 10px rgba(88, 101, 242, 0.6));
        }
        .icon-roblox:hover img { 
            filter: invert(33%) sepia(87%) saturate(2256%) hue-rotate(195deg) brightness(101%) contrast(106%) !important; 
        } 

        .spotify-mini {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px;
            width: 280px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mini-info { display: flex; align-items: center; gap: 10px; }
        .mini-img { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; }
        .mini-text b { color: #ffffff; font-size: 0.8rem; display: block; }
        .mini-text span { color: #7e7d7d; font-size: 0.7rem; }

        .mini-controls { display: flex; align-items: center; justify-content: space-between; }
        .control-btns { display: flex; gap: 15px; color: #1DB954; align-items: center; }
        .btn { cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .btn:hover { opacity: 1; }
        
        .vol-box { display: flex; align-items: center; gap: 8px; width: 80px; }
        .vol-slider { width: 100%; height: 3px; cursor: pointer; accent-color: #1DB954; }

        #toast {
            position: fixed; bottom: 40px; background: rgba(255,255,255,0.1);
            color: #fff; padding: 10px 20px; border-radius: 50px; opacity: 0; transition: 0.5s;
            left: 50%; transform: translateX(-50%); z-index: 100; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="entry-overlay" onclick="startExperience()">
        <h2>Clique para iniciar</h2>
    </div>

    <div class="bg-animated"></div>

    <div class="profile-card">
        <img src="foto perfil.jpg" class="avatar">
        <h1>KnRichBoy</h1>

        <div class="discord-pill" onclick="copyDiscord()">
            <img src="download (22).jpg">
            <div class="discord-txt">
                <b>Discord</b>
                <span>3zgw</span>
            </div>
        </div>

        <div class="icon-container">
            <a href="https://www.instagram.com/knt26k/" target="_blank" class="icon-link icon-instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@kauan_szzz" target="_blank" class="icon-link icon-tiktok"><i class="fab fa-tiktok"></i></a>
            <a href="javascript:void(0)" onclick="copyDiscord()" class="icon-link icon-discord"><i class="fab fa-discord"></i></a>
            <a href="https://www.roblox.com/users/7261590246/profile" target="_blank" class="icon-link icon-roblox">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="width:22px; filter:invert(1); transition: 0.4s;">
            </a>
        </div>
    </div>

    <div class="spotify-mini">
        <div class="mini-info">
            <img src="Spotify-Logo-Transparent-File.webp" class="mini-img">
            <div class="mini-text">
                <b id="m-title">Música 1</b>
                <span>KnRichBoy Playlist</span>
            </div>
        </div>
        <div class="mini-controls">
            <div class="control-btns">
                <i class="fas fa-step-backward btn" onclick="prev()"></i>
                <i class="fas fa-play btn" id="p-icon" onclick="toggle()"></i>
                <i class="fas fa-step-forward btn" onclick="next()"></i>
            </div>
            <div class="vol-box">
                <i class="fas fa-volume-down" style="color:#fff; font-size:0.7rem"></i>
                <input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.5" oninput="setVol(this.value)">
            </div>
        </div>
    </div>

    <div id="toast">Discord copiado</div>
    <audio id="player"></audio>

    <script>
        const audio = document.getElementById('player');
        const pIcon = document.getElementById('p-icon');
        const mTitle = document.getElementById('m-title');
        let index = 0;

        const songs = [
            { n: "Waiting", f: "waii.mp3" },
            { n: "cats in the cold", f: "musicadojusto1.mp3" },
            { n: "COULD BE WRONG", f: "musica3.mp3" },
            { n: "Do To Me", f: "musica2.mp3" }
        ];

        function load(i) {
            audio.src = songs[i].f;
            mTitle.innerText = songs[i].n;
        }

        function startExperience() {
            const overlay = document.getElementById('entry-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
            }, 800);

            load(0);
            audio.play().then(() => {
                pIcon.className = "fas fa-pause btn";
            }).catch(e => console.log("Erro ao tocar:", e));
        }

        function toggle() {
            if (audio.paused) {
                audio.play().then(() => {
                    pIcon.className = "fas fa-pause btn";
                }).catch(() => {
                    alert("Clique em qualquer lugar da tela e tente o Play novamente!");
                });
            } else {
                audio.pause();
                pIcon.className = "fas fa-play btn";
            }
        }

        function next() { 
            index = (index + 1) % songs.length; 
            load(index); 
            audio.play(); 
            pIcon.className = "fas fa-pause btn"; 
        }

        function prev() { 
            index = (index - 1 + songs.length) % songs.length; 
            load(index); 
            audio.play(); 
            pIcon.className = "fas fa-pause btn"; 
        }

        function setVol(v) { audio.volume = v; }

        function copyDiscord() {
            navigator.clipboard.writeText("3zgw");
            const t = document.getElementById('toast');
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        audio.volume = 0.5;
    </script>
</body>
</html>

<div id="particles-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></div>

<script>
    function createParticle() {
        const container = document.getElementById('particles-container');
        const particle = document.createElement('div');
        
        // Estilo da partícula
        const size = Math.random() * 3 + 'px';
        particle.style.width = size;
        particle.style.height = size;
        particle.style.background = 'rgba(255, 255, 255, 0.2)'; // Branco suave
        particle.style.position = 'absolute';
        particle.style.borderRadius = '50%';
        particle.style.top = '100%';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.boxShadow = '0 0 10px rgba(255, 255, 255, 0.3)';
        
        container.appendChild(particle);

        // Animação de subida
        const duration = Math.random() * 10 + 10 + 's';
        particle.animate([
            { transform: 'translateY(0) translateX(0)', opacity: 0 },
            { opacity: 0.5, offset: 0.2 },
            { transform: `translateY(-110vh) translateX(${Math.random() * 100 - 50}px)`, opacity: 0 }
        ], {
            duration: parseFloat(duration) * 1000,
            easing: 'linear'
        });

        // Remove a partícula depois que a animação acaba
        setTimeout(() => {
            particle.remove();
        }, parseFloat(duration) * 1000);
    }

    // Cria uma nova partícula a cada 300ms
    setInterval(createParticle, 30);
</script>
